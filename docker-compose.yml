services:
  web:
    build:
      context: .
    container_name: aptly-web
    command: ["npm", "run", "dev"]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://aptly:aptly@postgres:5432/aptly?schema=public
      DIRECT_DATABASE_URL: postgresql://aptly:aptly@postgres:5432/aptly?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
    container_name: aptly-worker
    command: ["npm", "run", "worker:dev"]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://aptly:aptly@postgres:5432/aptly?schema=public
      DIRECT_DATABASE_URL: postgresql://aptly:aptly@postgres:5432/aptly?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: aptly-postgres
    environment:
      POSTGRES_USER: aptly
      POSTGRES_PASSWORD: aptly
      POSTGRES_DB: aptly
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aptly -d aptly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aptly-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
