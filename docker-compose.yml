services:
  web:
    build:
      context: .
    container_name: aptly-web
    command: ["npm", "run", "start"]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://aptly:aptly@postgres:5432/aptly?schema=public
      DIRECT_DATABASE_URL: postgresql://aptly:aptly@postgres:5432/aptly?schema=public
      REDIS_URL: redis://redis:6379
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
    container_name: aptly-worker
    command: ["npm", "run", "worker:prod"]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://aptly:aptly@postgres:5432/aptly?schema=public
      DIRECT_DATABASE_URL: postgresql://aptly:aptly@postgres:5432/aptly?schema=public
      REDIS_URL: redis://redis:6379
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: aptly-postgres
    environment:
      POSTGRES_USER: aptly
      POSTGRES_PASSWORD: aptly
      POSTGRES_DB: aptly
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aptly -d aptly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aptly-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aptly-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: aptlyminio
      MINIO_ROOT_PASSWORD: aptlyminiosecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: aptly-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "mc alias set aptly http://minio:9000 aptlyminio aptlyminiosecret && mc mb --ignore-existing aptly/aptly-media-dev",
      ]

volumes:
  postgres-data:
  redis-data:
  minio-data:
